<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katy Finance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap');
        :root { --bg-dark: #0f172a; --blue-accent: #2563eb; }
        body { background-color: var(--bg-dark); font-family: 'Inter', sans-serif; color: #f1f5f9; padding-bottom: 90px; }
        .industrial-card { border: 1px solid #334155; background: linear-gradient(145deg, #1e293b, #0f172a); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .header-glass { background: rgba(15, 23, 42, 0.98); border-bottom: 2px solid var(--blue-accent); }
        .bottom-nav { background: rgba(15, 23, 42, 0.95); border-top: 1px solid #334155; backdrop-filter: blur(10px); }
        .nav-item.active { color: var(--blue-accent); border-top: 3px solid var(--blue-accent); background: rgba(37, 99, 235, 0.1); }
        .modal { display: none; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .loader { width: 40px; height: 40px; border: 4px solid #1e3a8a; border-bottom-color: #2563eb; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="header-glass sticky top-0 z-40 p-5 flex justify-between items-center shadow-xl">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter text-white">KATY FINANCE</h1>
            <p id="label-vista" class="text-[9px] font-bold text-blue-400 tracking-[0.3em] uppercase">Control de Gastos</p>
        </div>
        <button onclick="sincronizar()" class="h-10 w-10 rounded-xl bg-blue-900/30 border border-blue-500/50 flex items-center justify-center text-blue-400">
            <i class="fas fa-sync-alt"></i>
        </button>
    </header>

    <main class="max-w-md mx-auto p-4" id="main-content">
        <div class="py-20 text-center"><span class="loader"></span></div>
    </main>

    <nav class="bottom-nav fixed bottom-0 w-full z-40 flex justify-around h-20 max-w-md left-1/2 -translate-x-1/2">
        <button onclick="cambiarVista('gastos')" id="nav-gastos" class="nav-item active flex-1 flex flex-col items-center justify-center text-slate-500">
            <i class="fas fa-file-invoice-dollar text-xl mb-1"></i>
            <span class="text-[8px] font-bold uppercase">Gastos</span>
        </button>
        <button onclick="cambiarVista('ingresos')" id="nav-ingresos" class="nav-item flex-1 flex flex-col items-center justify-center text-slate-500">
            <i class="fas fa-hand-holding-dollar text-xl mb-1"></i>
            <span class="text-[8px] font-bold uppercase">Ingresos</span>
        </button>
        <button onclick="cambiarVista('saldos')" id="nav-saldos" class="nav-item flex-1 flex flex-col items-center justify-center text-slate-500">
            <i class="fas fa-wallet text-xl mb-1"></i>
            <span class="text-[8px] font-bold uppercase">Saldos</span>
        </button>
    </nav>

    <div id="modal-pago" class="modal fixed inset-0 z-50 items-center justify-center p-4">
        <div class="industrial-card w-full max-w-sm rounded-3xl p-6 border-t-4 border-blue-500">
            <h2 id="pago-titulo" class="text-lg font-black uppercase text-white mb-1">Procesar Pago</h2>
            <p id="pago-subtitulo" class="text-xs text-slate-400 mb-6 font-bold uppercase tracking-widest italic"></p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-blue-400 uppercase mb-2 block">Monto a abonar ($)</label>
                    <input type="number" id="p-monto-abono" class="w-full bg-slate-800 border border-slate-600 text-white p-4 rounded-xl text-xl font-bold focus:border-blue-500 outline-none">
                </div>
                
                <button onclick="marcarPagoTotal()" class="w-full py-2 bg-blue-900/30 border border-blue-500/50 text-blue-400 rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">
                    <i class="fas fa-check-double mr-2"></i> Seleccionar Pago Total
                </button>

                <div class="flex gap-3 pt-4">
                    <button onclick="cerrarModales()" class="flex-1 py-4 bg-slate-800 text-slate-400 rounded-xl font-bold uppercase text-xs">Cancelar</button>
                    <button onclick="confirmarPago()" id="btn-confirmar-pago" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black uppercase text-xs shadow-lg shadow-blue-900/40">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-gasto" class="modal fixed inset-0 z-50 items-center justify-center p-4">
        <div class="industrial-card w-full max-w-sm rounded-3xl p-6 border-t-4 border-blue-500">
            <h2 class="text-lg font-black uppercase text-white mb-6">Nuevo Gasto</h2>
            <div class="space-y-4">
                <input type="text" id="g-desc" placeholder="Descripción" class="w-full bg-slate-800 border border-slate-600 text-white p-4 rounded-xl">
                <input type="number" id="g-monto" placeholder="Monto Base ($)" class="w-full bg-slate-800 border border-slate-600 text-white p-4 rounded-xl">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="g-bcv" placeholder="BCV" class="w-full bg-slate-800 border border-slate-600 text-white p-4 rounded-xl">
                    <input type="number" id="g-binance" placeholder="Binance" class="w-full bg-slate-800 border border-slate-600 text-white p-4 rounded-xl">
                </div>
                <select id="g-billetera" class="w-full bg-slate-800 border border-slate-600 text-white p-4 rounded-xl uppercase font-bold text-sm">
                    <option value="Facebank">Facebank</option><option value="Binance">Binance</option><option value="Zinli">Zinli</option><option value="Efectivo">Efectivo</option>
                </select>
                <button onclick="guardarGasto()" id="btn-guardar-gasto" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase shadow-lg shadow-blue-900/40">Crear Gasto</button>
                <button onclick="cerrarModales()" class="w-full py-2 text-slate-500 text-[10px] font-bold uppercase tracking-widest">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxOZghPKDZbmwNISyRVl2c6smuMe5WyXYSEbTKWvioE0R9oIXB7GylQIerF1dmz32Nd/exec";
        let datosLocales = { gastos: [], ingresos: [], saldos: [] };
        let vistaActual = 'gastos';
        let gastoSeleccionado = null;

        async function sincronizar() {
            document.getElementById('main-content').innerHTML = '<div class="py-20 text-center"><span class="loader"></span></div>';
            try {
                const response = await fetch(API_URL);
                datosLocales = await response.json();
                renderizarVista();
            } catch (e) { alert("Error de conexión"); }
        }

        function cambiarVista(v) {
            vistaActual = v;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${v}`).classList.add('active');
            document.getElementById('label-vista').innerText = v === 'gastos' ? 'Control de Gastos' : v === 'ingresos' ? 'Dinero Entrante' : 'Estado de Cuentas';
            renderizarVista();
        }

        function renderizarVista() {
            const container = document.getElementById('main-content');
            let html = '';

            if (vistaActual === 'gastos') {
                html = `<div class="flex justify-between items-center mb-6"><h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Planificación</h2><button onclick="abrirModal('modal-gasto')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase shadow-lg shadow-blue-900/30">Nuevo</button></div>`;
                datosLocales.gastos.forEach(g => {
                    const req = Number(g.MONTO_REAL_USD);
                    const abo = Number(g.ABONADO_USD || 0);
                    const pct = Math.min((abo / req) * 100, 100);
                    const esPagado = g.ESTADO === 'PAGADO';

                    html += `
                        <div class="industrial-card p-5 rounded-3xl mb-4 border-l-4 ${esPagado ? 'border-green-500' : 'border-blue-600'}">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-black text-white leading-tight uppercase tracking-tight">${g.DESCRIPCION}</h3>
                                <button onclick="eliminarGasto('${g.ID}')" class="text-slate-600 hover:text-red-500"><i class="fas fa-trash-alt text-xs"></i></button>
                            </div>
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <p class="text-2xl font-black text-white">$${req.toFixed(2)}</p>
                                    <p class="text-[9px] font-bold text-blue-400 uppercase tracking-widest"><i class="fas fa-wallet mr-1"></i>${g.BILLETERA}</p>
                                </div>
                                <button onclick="prepararPago(${JSON.stringify(g).replace(/"/g, '&quot;')})" class="px-3 py-2 rounded-lg text-[9px] font-black uppercase tracking-tighter shadow-md ${esPagado ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-red-500/20 text-red-400 border border-red-500/30'}">
                                    ${esPagado ? 'Pagado' : abo > 0 ? 'Abonado $' + abo.toFixed(2) : 'Pendiente'}
                                </button>
                            </div>
                            <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                <div class="h-full ${esPagado ? 'bg-green-500' : 'bg-blue-500'} transition-all" style="width: ${pct}%"></div>
                            </div>
                        </div>`;
                });
            } else if (vistaActual === 'saldos') {
                let total = 0;
                html = `<h2 class="text-center text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-6">Disponibilidad en Cuentas</h2>`;
                datosLocales.saldos.forEach(s => {
                    total += Number(s.SALDO_USD);
                    html += `<div class="industrial-card p-5 rounded-2xl mb-3 flex justify-between items-center"><span class="font-black text-blue-400 uppercase text-xs">${s.BILLETERA}</span><span class="text-xl font-bold text-white">$${Number(s.SALDO_USD).toFixed(2)}</span></div>`;
                });
                html = `<div class="industrial-card p-8 rounded-3xl mb-8 text-center bg-gradient-to-b from-blue-900/30 to-transparent border-t-2 border-blue-500"><p class="text-[9px] text-blue-300 font-black uppercase tracking-[0.4em] mb-2">Total Efectivo</p><p class="text-4xl font-black text-white">$${total.toFixed(2)}</p></div>` + html;
            }
            container.innerHTML = html || '<p class="text-center text-slate-500 py-20 text-xs">Sin registros</p>';
        }

        function prepararPago(gasto) {
            gastoSeleccionado = gasto;
            const falta = (Number(gasto.MONTO_REAL_USD) - Number(gasto.ABONADO_USD || 0)).toFixed(2);
            document.getElementById('pago-titulo').innerText = gasto.DESCRIPCION;
            document.getElementById('pago-subtitulo').innerText = `Faltan $${falta} para pagar todo`;
            document.getElementById('p-monto-abono').value = "";
            abrirModal('modal-pago');
        }

        function marcarPagoTotal() {
            const falta = (Number(gastoSeleccionado.MONTO_REAL_USD) - Number(gastoSeleccionado.ABONADO_USD || 0)).toFixed(2);
            document.getElementById('p-monto-abono').value = falta;
            confirmarPago(true);
        }

        async function confirmarPago(esTotal = false) {
            const monto = parseFloat(document.getElementById('p-monto-abono').value);
            if (!monto && !esTotal) return alert("Ingresa un monto");
            
            const btn = document.getElementById('btn-confirmar-pago');
            btn.innerText = "Procesando..."; btn.disabled = true;

            const payload = { accion: "actualizarPago", id: gastoSeleccionado.ID, montoAbonar: monto, pagoTotal: esTotal };
            await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            
            btn.innerText = "Confirmar"; btn.disabled = false;
            cerrarModales();
            sincronizar();
        }

        async function guardarGasto() {
            const btn = document.getElementById('btn-guardar-gasto');
            const desc = document.getElementById('g-desc').value;
            const monto = parseFloat(document.getElementById('g-monto').value);
            const bcv = parseFloat(document.getElementById('g-bcv').value);
            const binance = parseFloat(document.getElementById('g-binance').value);
            const billetera = document.getElementById('g-billetera').value;
            if(!desc || !monto) return alert("Completa los datos");
            btn.innerText = "Guardando..."; btn.disabled = true;
            const payload = { accion: "agregarGasto", descripcion: desc, montoUSD: monto, tasaBCV: bcv, montoBS: monto*bcv, tasaBinance: binance, montoReal: (monto*bcv)/binance, billetera: billetera };
            await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            cerrarModales(); sincronizar();
        }

        async function eliminarGasto(id) {
            if(!confirm("¿Eliminar este registro?")) return;
            await fetch(API_URL, { method: "POST", body: JSON.stringify({ accion: "eliminarGasto", id: id }) });
            sincronizar();
        }

        function abrirModal(id) { document.getElementById(id).classList.add('active'); }
        function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        sincronizar();
    </script>
</body>
</html>
