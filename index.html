<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katy Home Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Estilo Industrial: Gris Carbón y Azul Eléctrico */
        :root {
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --electric-blue: #2563eb;
            --accent-blue: #1e3a8a;
        }
        body { background-color: var(--dark-bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .industrial-card { 
            background: linear-gradient(145deg, #1e293b, #111827);
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .header-gradient {
            background: linear-gradient(to right, #1e3a8a, #0f172a);
            border-bottom: 3px solid var(--electric-blue);
        }
        .shimmer {
            background: linear-gradient(90deg, #1e293b 0%, #334155 50%, #1e293b 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <header class="header-gradient p-6 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter uppercase italic">Katy Finance</h1>
                <div class="flex items-center gap-2">
                    <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
                    <p class="text-blue-400 text-[10px] font-bold tracking-[0.2em] uppercase">Sistema Operativo Hogar</p>
                </div>
            </div>
            <div class="bg-blue-600/20 p-3 rounded-lg border border-blue-500/30">
                <i class="fas fa-microchip text-blue-400 text-xl"></i>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="industrial-card p-4 rounded-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-1 opacity-10"><i class="fas fa-landmark text-4xl"></i></div>
                <p class="text-blue-400 text-[9px] font-black uppercase mb-1 tracking-widest">Tasa BCV</p>
                <p id="val-bcv" class="text-2xl font-mono font-bold text-white">---</p>
            </div>
            <div class="industrial-card p-4 rounded-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-1 opacity-10"><i class="fab fa-bitcoin text-4xl"></i></div>
                <p class="text-yellow-500 text-[9px] font-black uppercase mb-1 tracking-widest">Tasa Binance</p>
                <p id="val-binance" class="text-2xl font-mono font-bold text-white">---</p>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-[0.3em]">Gastos Proyectados</h2>
            <button onclick="cargarDatos()" class="text-blue-500 text-xs hover:rotate-180 transition-all duration-500">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>

        <div id="lista-gastos" class="space-y-4">
            <div class="space-y-4">
                <div class="shimmer h-24 w-full rounded-xl opacity-20"></div>
                <div class="shimmer h-24 w-full rounded-xl opacity-20"></div>
                <p class="text-center text-slate-600 text-[10px] font-bold uppercase mt-4">Sincronizando con Google Sheets...</p>
            </div>
        </div>
    </main>

    <script>
        // PEGA TU URL DE GOOGLE AQUÍ
        const MI_API_URL = "https://script.google.com/macros/s/AKfycbxOZghPKDZbmwNISyRVl2c6smuMe5WyXYSEbTKWvioE0R9oIXB7GylQIerF1dmz32Nd/exec";

        async function cargarDatos() {
            const contenedor = document.getElementById('lista-gastos');
            
            try {
                const response = await fetch(MI_API_URL);
                if (!response.ok) throw new Error('Respuesta de red no ok');
                
                const data = await response.json();
                
                if (data.error) {
                    contenedor.innerHTML = `<div class="p-4 bg-red-900/20 border border-red-500 text-red-400 text-xs rounded-lg">${data.error}</div>`;
                    return;
                }

                if (data.length > 0) {
                    // Actualizar Tasas
                    document.getElementById('val-bcv').innerText = data[0].TASA_BCV ? data[0].TASA_BCV + " Bs" : "---";
                    document.getElementById('val-binance').innerText = data[0].TASA_BINANCE ? data[0].TASA_BINANCE + " Bs" : "---";

                    contenedor.innerHTML = ""; // Limpiar carga

                    data.forEach(item => {
                        const esPagado = item.ESTADO === "PAGADO";
                        const tarjeta = `
                            <div class="industrial-card p-5 rounded-2xl relative border-r-4 ${esPagado ? 'border-green-500' : 'border-blue-600'}">
                                <div class="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 class="font-bold text-lg text-white tracking-tight">${item.DESCRIPCION}</h3>
                                        <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mt-1">
                                            <i class="fas fa-wallet mr-1 text-[8px]"></i> ${item.BILLETERA || 'POR DEFINIR'}
                                        </p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-xl font-black text-white">$${Number(item.MONTO_REAL_USD || 0).toFixed(2)}</p>
                                        <p class="text-[10px] text-slate-500 font-mono italic">Bs. ${Number(item.MONTO_BS || 0).toLocaleString()}</p>
                                    </div>
                                </div>
                                
                                <div class="flex justify-between items-center border-t border-slate-800 pt-3">
                                    <span class="text-[8px] font-black px-2 py-1 rounded-md uppercase tracking-tighter ${esPagado ? 'bg-green-500/10 text-green-400 border border-green-500/30' : 'bg-blue-500/10 text-blue-400 border border-blue-500/30'}">
                                        ${item.ESTADO || 'PENDIENTE'}
                                    </span>
                                    <p class="text-[9px] text-slate-600 font-bold uppercase tracking-tighter">Base: $${item.MONTO_USD || '0'}</p>
                                </div>
                            </div>
                        `;
                        contenedor.innerHTML += tarjeta;
                    });
                } else {
                    contenedor.innerHTML = `<p class="text-center text-slate-500 text-xs">La hoja GASTOS está vacía.</p>`;
                }

            } catch (error) {
                console.error("Error:", error);
                contenedor.innerHTML = `
                    <div class="bg-red-900/20 p-6 rounded-2xl border border-red-800 text-center">
                        <i class="fas fa-exclamation-triangle text-red-500 text-xl mb-2"></i>
                        <p class="text-red-400 text-[10px] font-black uppercase tracking-widest">Error de Sincronización</p>
                        <p class="text-[9px] text-slate-500 mt-2 italic">Asegúrate de que la URL de Google Apps Script termine en /exec y que la implementación sea pública.</p>
                    </div>
                `;
            }
        }

        // Ejecutar carga al abrir
        cargarDatos();
    </script>
</body>
</html>
